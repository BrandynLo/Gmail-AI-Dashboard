<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #f7f4ef;
      --surface:   #ffffff;
      --ink:       #1c1917;
      --ink-soft:  #78716c;
      --accent:    #2d5a3d;
      --accent-lt: #e8f0eb;
      --border:    #e5e0d8;
      --radius:    10px;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--ink);
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 64px 20px 80px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 48px 44px;
      width: 100%;
      max-width: 620px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.04);
    }

    .header {
      margin-bottom: 36px;
    }

    .header h1 {
      font-family: 'Lora', Georgia, serif;
      font-weight: 500;
      font-size: 1.65rem;
      letter-spacing: -0.01em;
      color: var(--ink);
      margin-bottom: 6px;
    }

    .header p.subtitle {
      font-size: 0.875rem;
      color: var(--ink-soft);
      font-weight: 300;
      line-height: 1.5;
    }

    .divider {
      height: 1px;
      background: var(--border);
      margin: 28px 0;
    }

    /* Status pill */
    #status {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      font-size: 0.8rem;
      font-weight: 500;
      padding: 5px 12px;
      border-radius: 999px;
      background: #f0ece6;
      color: var(--ink-soft);
      margin-bottom: 20px;
      transition: background 0.3s, color 0.3s;
    }

    #status .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #c4b9ac;
      transition: background 0.3s;
    }

    #status.connected {
      background: var(--accent-lt);
      color: var(--accent);
    }

    #status.connected .dot {
      background: var(--accent);
    }

    /* Connect button */
    #connectBtn {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 11px 20px;
      background: var(--ink);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      letter-spacing: 0.01em;
    }

    #connectBtn:hover { background: #2c2825; }
    #connectBtn:active { transform: scale(0.98); }

    #connectBtn svg {
      width: 18px;
      height: 18px;
      flex-shrink: 0;
    }

    /* Ask section */
    #askSection {
      display: none;
      flex-direction: column;
      gap: 14px;
      animation: fadeUp 0.4s ease forwards;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .input-row {
      display: flex;
      gap: 10px;
      align-items: stretch;
    }

    #question {
      flex: 1;
      padding: 11px 14px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--bg);
      color: var(--ink);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    #question::placeholder { color: #b8b0a6; }

    #question:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(45,90,61,0.08);
    }

    #askBtn {
      padding: 11px 18px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.875rem;
      font-weight: 500;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.2s, transform 0.1s;
    }

    #askBtn:hover:not(:disabled) { background: #234a32; }
    #askBtn:active:not(:disabled) { transform: scale(0.97); }
    #askBtn:disabled { background: #a3bfaa; cursor: not-allowed; }

    /* Answer box */
    #answer {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px;
      font-size: 0.9rem;
      line-height: 1.7;
      color: var(--ink);
      white-space: pre-wrap;
      min-height: 100px;
      font-family: 'Lora', Georgia, serif;
      font-style: italic;
      color: #4a4540;
      transition: opacity 0.2s;
    }

    #answer.loading {
      opacity: 0.5;
    }

    .answer-label {
      font-family: 'DM Sans', sans-serif;
      font-style: normal;
      font-size: 0.72rem;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--ink-soft);
      margin-bottom: 8px;
    }

    .footer-note {
      margin-top: 32px;
      font-size: 0.75rem;
      color: #b8b0a6;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="header">
      <h1>AI Dashboard</h1>
      <p class="subtitle">Ask questions about your Gmail and Google Calendar.</p>
    </div>

    <div id="status">
      <span class="dot"></span>
      <span id="statusText">Not connected</span>
    </div>

    <button id="connectBtn" onclick="connectGoogle()">
      <!-- Google G icon -->
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
      </svg>
      Connect Google Account
    </button>

    <div id="askSection">
      <div class="divider"></div>
      <div class="input-row">
        <input type="text" id="question"
               placeholder="What's on my calendar this week?" />
        <button id="askBtn" onclick="ask()">Ask</button>
      </div>
      <div>
        <div class="answer-label">Response</div>
        <div id="answer">Your answer will appear here.</div>
      </div>
    </div>

    <div class="footer-note">Powered by AWS Bedrock &amp; Google APIs</div>
  </div>

  <script>
    // Replace with your API Gateway URL from 'sam deploy' Outputs → ApiUrl
    const API_URL = "https://960e4878fb.execute-api.us-east-1.amazonaws.com/Prod";

    let sessionId = null;

    window.onload = () => {
      const params = new URLSearchParams(window.location.search);
      sessionId = params.get('session_id');
      if (sessionId) {
        document.getElementById('statusText').textContent = 'Connected to Google';
        document.getElementById('status').className = 'connected';
        document.getElementById('connectBtn').style.display = 'none';
        document.getElementById('askSection').style.display = 'flex';
        window.history.replaceState({}, document.title, window.location.pathname);
      }
    };

    function connectGoogle() {
      window.location.href = API_URL + '/auth';
    }

    async function ask() {
      const question = document.getElementById('question').value.trim();
      if (!question) return;

      const askBtn   = document.getElementById('askBtn');
      const answerEl = document.getElementById('answer');

      askBtn.disabled = true;
      answerEl.textContent = 'Thinking...';
      answerEl.classList.add('loading');

      try {
        const res  = await fetch(API_URL + '/ask', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ session_id: sessionId, question })
        });
        const data = await res.json();

        answerEl.classList.remove('loading');

        if (!res.ok) {
          answerEl.textContent = '⚠️ ' + (data.error || `HTTP ${res.status}`);
        } else {
          answerEl.textContent = data.answer;
        }
      } catch (err) {
        answerEl.classList.remove('loading');
        answerEl.textContent = '⚠️ Network error — check your connection and try again.';
        console.error(err);
      } finally {
        askBtn.disabled = false;
      }
    }

    document.addEventListener('DOMContentLoaded', () => {
      document.getElementById('question').addEventListener('keydown', (e) => {
        if (e.key === 'Enter') ask();
      });
    });
  </script>
</body>
</html>
